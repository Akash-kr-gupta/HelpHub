services:
  - type: web
    name: helphub-backend
    runtime: node
    plan: free
    rootDir: backend_node
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  - type: static
    name: helphub-frontend
    rootDir: frontend_react
    staticPublishPath: ./dist
    buildCommand: npm ci && npm run build
    envVars:
      - key: NODE_ENV
        value: production
