services:
  - type: web
    name: helphub-backend
    runtime: node
    plan: free
    rootDir: backend_node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false

  - type: static
    name: helphub-frontend
    rootDir: frontend_react
    staticPublishPath: dist
    buildCommand: npm install && npm run build
    envVars:
      - key: NODE_ENV
        value: production
